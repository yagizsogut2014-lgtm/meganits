<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Sayfa Bulunamadı</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            color: #fff;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
        }

        /* 404 yazısını devasa yapıyoruz */
        .giant-404 {
            position: absolute;
            font-size: 30vw; /* Ekran genişliğine göre dinamik büyüme */
            font-weight: 900;
            color: #1a1a1a;
            z-index: 0;
            user-select: none;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 40px;
            border-left: 5px solid #ff4757;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
        }

        p {
            font-size: 1.2rem;
            color: #ccc;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 30px;
            background: #ff4757;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="giant-404">404</div>

    <div class="content">
        <h1>KAPANDI</h1>
        <p>Aradığınız içerik artık burada değil.</p>
        <a href="/" class="btn">Geri Dön</a>
    </div>

</body>
</html>
